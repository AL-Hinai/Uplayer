<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uplayer</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-brand">
      <span class="brand-icon">▶</span>
      <span class="brand-name">Uplayer</span>
    </div>
    <ul class="nav-links" id="navLinks">
      <li><a href="#/" class="nav-link" data-page="home">Home</a></li>
      <li><a href="#/movies" class="nav-link" data-page="movies">Movies</a></li>
      <li><a href="#/tv" class="nav-link" data-page="tv">TV Shows</a></li>
      <li><a href="#/search" class="nav-link" data-page="search">Search</a></li>
      <li><a href="#/recommendations" class="nav-link" data-page="recommendations">For You</a></li>
      <li><a href="#/history" class="nav-link" data-page="history">History</a></li>
      <li><a href="#/stream" class="nav-link" data-page="stream">▶ Stream</a></li>
    </ul>
    <div class="nav-search">
      <input type="text" id="navSearchInput" placeholder="Search..." autocomplete="off" />
      <button class="nav-search-btn" id="navSearchBtn" aria-label="Search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Main Content -->
  <main id="app" class="app-main">
    <div class="loading-screen" id="initialLoader">
      <div class="loader-brand">
        <span class="brand-icon large">▶</span>
        <span>Uplayer</span>
      </div>
      <div class="spinner"></div>
    </div>
  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/app.js"></script>
</body>
</html>
